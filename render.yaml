services:
  - type: web
    name: cropcare
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # Set securely in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # Set securely in Render dashboard
      - key: ALLOW_ORIGINS
        value: "*"
